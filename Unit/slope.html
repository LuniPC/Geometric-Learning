<!DOCTYPE html>
<html>
<head>
  <title>Slope Clone</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #000;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0f0;
      font-family: Arial, sans-serif;
      font-size: 16px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="info">Slope Clone – Use A/D or ←/→ to move</div>
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    const state = {
      ballX: 0,
      ballY: -50,
      ballZ: 0,
      speedZ: 0.3,
      laneWidth: 6,
      obstacles: [],
      time: 0,
      gameOver: false,
      score: 0
    };

    function spawnObstacle() {
      const lane = (Math.random() * 2 - 1) * 8; // left/right
      const width = 4 + Math.random() * 3;
      const z = state.ballZ + 60 + Math.random() * 40;
      state.obstacles.push({ x: lane, z, width });
    }

    function update(dt) {
      if (state.gameOver) return;

      state.time += dt;
      state.score += dt * 10;

      // Move ball left/right
      const moveSpeed = 0.15;
      if (keys['a'] || keys['arrowleft']) state.ballX -= moveSpeed * dt * 60;
      if (keys['d'] || keys['arrowright']) state.ballX += moveSpeed * dt * 60;

      // Forward movement
      state.ballZ += state.speedZ * dt * 60;
      state.speedZ += 0.0005 * dt * 60; // slowly speed up

      // Spawn obstacles
      if (state.obstacles.length < 12 || (state.obstacles[state.obstacles.length - 1].z - state.ballZ) < 60) {
        spawnObstacle();
      }

      // Remove passed obstacles
      state.obstacles = state.obstacles.filter(o => o.z > state.ballZ - 10);

      // Collision check (simple)
      for (const o of state.obstacles) {
        const dz = o.z - state.ballZ;
        if (dz > -2 && dz < 2) {
          if (Math.abs(state.ballX - o.x) < o.width / 2) {
            state.gameOver = true;
          }
        }
      }
    }

    function project(x, y, z) {
      const camZ = state.ballZ - 10;
      const depth = (z - camZ);
      if (depth <= 0.1) return null;
      const scale = 200 / depth;
      const sx = canvas.width / 2 + x * scale;
      const sy = canvas.height / 2 + y * scale;
      return { x: sx, y: sy, scale };
    }

    function drawTrack() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Horizon
      ctx.fillStyle = '#020';
      ctx.fillRect(0, 0, canvas.width, canvas.height / 2);

      // Track lines
      for (let i = 0; i < 40; i++) {
        const z = state.ballZ + i * 4;
        const p1 = project(-state.laneWidth, 0, z);
        const p2 = project(state.laneWidth, 0, z);
        if (!p1 || !p2) continue;
        const alpha = 1 - i / 40;
        ctx.strokeStyle = `rgba(0,255,0,${alpha})`;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }

    function drawObstacles() {
      for (const o of state.obstacles) {
        const top = project(o.x - o.width / 2, 0, o.z);
        const bottom = project(o.x + o.width / 2, 0, o.z);
        if (!top || !bottom) continue;
        ctx.strokeStyle = '#f00';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(top.x, top.y);
        ctx.lineTo(bottom.x, bottom.y);
        ctx.stroke();
      }
    }

    function drawBall() {
      const p = project(state.ballX, -1, state.ballZ + 2);
      if (!p) return;
      const r = 10 * p.scale / 50;
      ctx.fillStyle = '#0f0';
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawHUD() {
      ctx.fillStyle = '#0f0';
      ctx.font = '20px Arial';
      ctx.fillText('Score: ' + Math.floor(state.score), 20, 40);

      if (state.gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0f0';
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '24px Arial';
        ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 20);
        ctx.textAlign = 'left';
      }
    }

    window.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'r' && state.gameOver) {
        state.ballX = 0;
        state.ballZ = 0;
        state.speedZ = 0.3;
        state.obstacles = [];
        state.score = 0;
        state.gameOver = false;
      }
    });

    let lastTime = performance.now();
    function loop(t) {
      const dt = (t - lastTime) / 1000;
      lastTime = t;

      update(dt);
      drawTrack();
      drawObstacles();
      drawBall();
      drawHUD();

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
