<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game 1</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    a {
      color: #4fc3f7;
    }
    #box {
      width: 100px;
      height: 100px;
      background: red;
      margin: 40px auto;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Game 1: Click the Box</h1>
  <p>Click the red box as many times as you can in 10 seconds.</p>
  <div id="box"></div>
  <p>Score: <span id="score">0</span></p>
  <p><a href="../index.html">Back to games list</a></p>

  <script>
    let score = 0;
    let timeLeft = 10;
    const box = document.getElementById('box');
    const scoreSpan = document.getElementById('score');

    box.addEventListener('click', () => {
      if (timeLeft > 0) {
        score++;
        scoreSpan.textContent = score;
      }
    });

    const timer = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        clearInterval(timer);
        alert('Time is up! Your score: ' + score);
      }
    }, 1000);
  </script>
</body>
</html>
