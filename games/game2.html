<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game 2</title>
  <style>
    body {
      background: #020817;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    a {
      color: #38bdf8;
    }
    #target {
      width: 40px;
      height: 40px;
      background: #22c55e;
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Game 2: Catch the Dot</h1>
  <p>Click the green dot as it moves around the screen.</p>
  <p>Score: <span id="score">0</span></p>
  <p><a href="../index.html">Back to games list</a></p>

  <div id="target"></div>

  <script>
    const target = document.getElementById('target');
    const scoreSpan = document.getElementById('score');
    let score = 0;

    function moveTarget() {
      const maxX = window.innerWidth - 40;
      const maxY = window.innerHeight - 40;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      target.style.left = x + 'px';
      target.style.top = y + 'px';
    }

    target.addEventListener('click', () => {
      score++;
      scoreSpan.textContent = score;
      moveTarget();
    });

    moveTarget();
  </script>
</body>
</html>
